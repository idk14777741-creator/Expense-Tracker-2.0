<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Prefix Sum 2.0</title>
	<link rel="stylesheet" href="style.css">
	<script defer src="script.js"></script>
</head>
<body>
	<div id="welcome-screen" class="welcome-container">
		<div class="welcome-card">
			<span class="welcome-icon">📊</span>
			<h2>Welcome to Prefix Sum 2.0</h2>
			<p>Track expenses and quickly query range totals using prefix sums.</p>
			<button class="start-btn" onclick="startApp()">Get Started</button>
		</div>
	</div>

	<div class="tracker-box">
		<h1>Expense Tracker</h1>
		<p class="subtitle">Prefix Sum Range Queries</p>

		<div class="section">
			<h3>Add Expense</h3>
			<input id="expenseInput" type="number" placeholder="Enter expense amount" />
			<button onclick="addExpense()">Add Expense</button>
		</div>

		<div class="section inputs-row">
			<div style="flex:1">
				<h3>Range Query</h3>
				<input id="l" type="number" placeholder="Left index (0-based)" />
				<input id="r" type="number" placeholder="Right index (0-based)" />
				<button class="calc-btn" onclick="findTotal()">Calculate Total</button>
			</div>
		</div>

		<hr />

		<div class="list-section">
			<div><strong>Expenses:</strong> <span id="list">[]</span></div>
			<div style="margin-top:8px;"><strong>Prefix Array:</strong> <span id="prefixList">[]</span></div>
		</div>

		<div id="output" class="result-card" style="display:block;margin-top:14px">Total Expense = ₹0</div>
		<p class="small-note">Tip: Use 0-based indexes for range queries.</p>
	</div>
</body>
</html>
